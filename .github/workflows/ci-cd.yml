name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug Project Structure (VERY IMPORTANT)
        run: ls -R

      - name: Verify Docker Running
        run: docker ps

      - name: Build Docker Image
        run: docker build -t cicd-backend ./backend

      - name: Ensure Minikube Running
        run: |
          minikube status || minikube start

      - name: Set Kubernetes Context
        run: kubectl config use-context minikube

      - name: Load Image into Minikube
        run: minikube image load cicd-backend

      - name: Restart Kubernetes Deployment
        run: kubectl rollout restart deployment backend-v1

      - name: Wait for Deployment Rollout
        run: kubectl rollout status deployment backend-v1

      - name: Verify Deployment
        run: kubectl get pods -o wide

      - name: Use Secrets (Debug Step)
        run: echo "Using secure credentials"
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
          PASSWORD: ${{ secrets.DOCKER_PASSWORD }}