name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t cicd-backend .

      - name: Load Image into Minikube
        run: minikube image load cicd-backend

      - name: Restart Kubernetes Deployment
        run: kubectl rollout restart deployment backend-v1