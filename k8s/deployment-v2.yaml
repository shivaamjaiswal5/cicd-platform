apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v2
spec:
  replicas: 1   # 🔥 smaller = canary

  selector:
    matchLabels:
      app: backend
      version: v2

  template:
    metadata:
      labels:
        app: backend
        version: v2

    spec:
      containers:
      - name: backend
        image: cicd-backend:v2
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 5000